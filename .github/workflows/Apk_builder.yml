name: Flutter Android Release (Anti-Reverse Engineering)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ARTIFACTS_DIR: release_output
  FLUTTER_VERSION: '3.35.7'
  FLUTTER_CHANNEL: 'stable'

jobs:
  build-android:
    name: Build Android Release (APK - Obfuscated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Prepare split-debug-info dir
        run: mkdir -p build/app/outputs/symbols

      - name: Build Obfuscated Android APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Collect Android artifacts
        run: |
          mkdir -p ${{ env.ARTIFACTS_DIR }}/release/android
          cp build/app/outputs/apk/release/*.apk ${{ env.ARTIFACTS_DIR }}/release/android/ 2>/dev/null || true
          ls -la ${{ env.ARTIFACTS_DIR }}/release/android || true

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-release-${{ github.run_number }}
          path: ${{ env.ARTIFACTS_DIR }}/release/android
